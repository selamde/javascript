<!doctype html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>todo list</title>
    <link rel="stylesheet" href="style.css" />
    <script src="scripts.js" defer></script>
  </head>
  <body>
    <div class="list-1">
      <p>Todo list 1</p>
      <input type="text" placeholder="Todo name" class="todo-input" />
      <button onclick="addTodo()">Add</button>
    </div>

    <div class="list-2">
      <p>Todo list 2</p>
      <input type="text" placeholder="Todo name" class="todo-list-input" />
      <button onclick="addTodoList()">add</button>
      <div class="input-value-display"></div>
    </div>

    <div class="list-3">
      <p>Todo list 3</p>
      <input
        class="name"
        type="text"
        name="text"
        placeholder="Enter name"
        id=""
      />
      <input class="date" type="date" name="" id="" />
      <button onclick="addTodoListFunc()">add</button>
      <div class="js-display-list"></div>
    </div>
  </body>
</html>
