<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
  </head>
  <body>
    <p>Rock Paper Scissors</p>
    <button onclick="console.log(playGame('rock'))">Rock</button>
    <button onclick="playGame('paper')">Paper</button>
    <button onclick="playGame('scissor')">Scissor</button>
  </body>
  <script>
    /*inorder not to set the score to 0 each time when the fucntion is called so we put it outside the function*/
    const score = {
      wins: 0,
      losses: 0,
      ties: 0,
    };

    function playGame(playerMove) {
      const randomNumber = Math.random();
      console.log(randomNumber);
      let computerMove = "";
      let result = "";

      if (randomNumber >= 0 && randomNumber < 1 / 3) {
        computerMove = "rock";
      } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
        computerMove = "paper";
      } else if (randomNumber >= 2 / 3 && randomNumber < 1) {
        computerMove = "scissor";
      }

      if (playerMove === "rock") {
        if (computerMove === "rock") {
          result = "Tie";
        } else if (computerMove === "paper") {
          result = "You Lose";
        } else if (computerMove === "scissor") {
          result = "You win";
        }
      }

      if (playerMove === "paper") {
        if (computerMove === "rock") {
          result = "You win";
        } else if (computerMove === "paper") {
          result = "Tie";
        } else if (computerMove === "scissor") {
          result = "You lose";
        }
      }

      if (playerMove === "scissor") {
        if (computerMove === "rock") {
          result = "You lose";
        } else if (computerMove === "paper") {
          result = "You win";
        } else if (computerMove === "scissor") {
          result = "Tie";
        }
      }

      if (result === "You win") {
        score.wins += 1;
      } else if (result === "You lose") {
        score.losses += 1;
      } else {
        score.ties += 1;
      }

      alert(
        `You picked ${playerMove}. The computer picked ${computerMove}. ${result}
        Wins= ${score.wins}, Losses= ${score.losses} and Ties= ${score.ties}
        `,
      );
      return 5;
    }
  </script>
</html>
